<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espaço de Eventos Premium</title>
  <meta name="description" content="Espaço de eventos sofisticado para casamentos, festas corporativas e celebrações exclusivas. Reserve já e viva momentos inesquecíveis.">
  <!-- Fontes premium -->

  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family:'Montserrat',sans-serif;background:#121212;color:#f5f5f5;line-height:1.6;}
    header {background:linear-gradient(rgba(214,51,132,0.7),rgba(166,30,92,0.8)),url('img/foto-piscina1.jpg') center/cover;height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;border-bottom:8px solid #d63384;}
    header h1 {font-family:'Cinzel Decorative',serif;font-size:3em;padding:20px;border-radius:15px;border:3px solid #d63384;letter-spacing:2px;}
    section {padding:50px 20px;max-width:1200px;margin:auto;}
    h2 {font-family:'Cinzel Decorative',serif;font-size:2.2em;color:#d63384;margin-bottom:20px;text-align:center;letter-spacing:1px;}
    p {text-align:center;margin-bottom:20px;font-size:1.1em;}
    .gallery {display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
    .gallery img {width:100%;border-radius:20px;border:3px solid #d63384;box-shadow:0 6px 12px rgba(0,0,0,0.5);transition:transform 0.3s,box-shadow 0.3s;}

    .contact {background:#1e1e1e;padding:40px;border-radius:15px;text-align:center;border:6px solid #d63384;}
    .contact p {margin:10px 0;font-size:1.1em;}
    .buttons {margin:20px 0;}
    .btn {border:none;padding:14px 22px;font-size:1.1em;border-radius:30px;cursor:pointer;transition:all 0.3s ease;margin:10px;font-family:'Montserrat',sans-serif;color:white;font-weight:600;letter-spacing:0.5px;}
    .btn:hover {transform:scale(1.05);box-shadow:0 0 12px #d63384;}
    .whatsapp {background:#25D366;}
    .instagram {background:#d63384;}
    .budget {background:#ff4081;}
    .location {background:#4285F4;}
    footer {background:#222;color:#fff;text-align:center;padding:20px;border-top:8px solid #d63384;font-family:'Montserrat',sans-serif;}
